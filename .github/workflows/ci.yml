# ── WhatsappErdBot CI/CD ────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, feat/*, fix/*]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: Syntax check all JS files
        run: |
          find src -name '*.js' -exec node -c {} \; 2>&1 | grep -v "^$" && exit 1 || true

      - name: Run tests
        run: npm test
        continue-on-error: true

      - name: Docker build test
        run: docker build -t whatsapp-erd-bot:ci .
